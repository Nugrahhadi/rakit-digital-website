name: 🎉 Build & Deploy Next.js Static to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: 🚀 Build App & Sync via SSH (SCP)
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-style: 'npm'
        node-version: 20 
        cache: 'npm'

    - name: 📦 Install Dependencies
      run: npm ci

    - name: 🏗️ Build Next.js Export
      run: npm run build

    - name: 🧹 Clean old files on Hostinger
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.FTP_SERVER }}       
        username: ${{ secrets.FTP_USERNAME }} 
        password: ${{ secrets.FTP_PASSWORD }} 
        port: 65002
        script: |
          rm -rf /home/u424643544/domains/rakitdigital.com/public_html/*

    - name: 📂 Upload "out" Folder via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 65002
        source: "out/*"
        target: "/home/u424643544/domains/rakitdigital.com/public_html/" 
        strip_components: 1